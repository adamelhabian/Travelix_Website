<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travelix- Contact Us</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="./Contactstyle.css">
</head>
<body>
 <nav id="navbar">
      <div class="logo-container">
        <img src="./Images/TravelixLogo.png" alt="Logo" />
        <h1 class="logo-tittle">Travelix</h1>
      </div>
      <ul class="nav-links">
        <li><a href="travel_recommendation.html" id="home">Home</a></li>
        <li><a href="./AboutUs.html" id="aboutUs">About Us</a></li>
        <li><a href="./ContactUs.html" id="contactUs">Contact Us</a></li>
   
    </nav>

    <section  class="Contactus-section">
 <!--Background photo-->
      <img
        src="./Images/TravelBackground.jpg"
        alt="Background Image"
        class="background-img"
      />
      <!--Background Overlay-->
      <div class="Overlay"></div>

      <!--Social media Icons-->
      <div class="Social-sideBar">
        <!-- Twitter / X -->
        <a href="https://twitter.com" target="_blank" class="social-link">
         <i class="fa-brands fa-x-twitter"></i>
        </a>

        <!-- Facebook -->
        <a href="https://facebook.com" target="_blank" class="social-link">
          <i class="fa-brands fa-facebook-f"></i>
        </a>

        <!-- Instagram -->
        <a href="https://instagram.com" target="_blank" class="social-link">
          <i class="fa-brands fa-instagram"></i>
        </a>

        <!-- YouTube -->
        <a href="https://youtube.com" target="_blank" class="social-link">
          <i class="fa-brands fa-youtube"></i>
        </a>
      </div>
<div class="contactus-content">
        <h2 class="Main-title">
          CONTACT US
        </h2>
        <p class="touchus">Get In Touch</p>
    </section>
        <section class="form-container">
            <form >
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="Enter your name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" rows="5" placeholder="Enter your message" required></textarea>
                </div>
                
                <button type="submit" class="submit-btn">Submit</button>
            </form>
        </section>

    </main>

</body>
</html>
